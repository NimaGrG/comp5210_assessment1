<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCP Foundation Catalogue</title>
  <meta name="description" content="Modern SCP catalogue using JSON, JavaScript and Speech API">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="site-header">
  <div class="container header-row">
    <a class="brand" href="index.html">SCP Foundation</a>

    <button class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
      Menu
    </button>

    <nav class="site-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="#scp-container">Catalogue</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container">
      <p class="eyebrow">SCP Foundation Database</p>
      <h1>SCP Catalogue</h1>
      <p class="lead">
        Dynamic SCP catalogue powered by JSON, JavaScript and browser Speech API.
      </p>
    </div>
  </section>

  <section class="container controls-section">
    <label for="searchInput" class="search-label">Search SCP subject</label>
    <input 
      type="search" 
      id="searchInput" 
      class="search-input" 
      placeholder="Search by SCP number, title, class or description"
    >
  </section>

  <section class="container">
    <div id="statusMessage" class="status-message">Loading SCP records...</div>
    <div class="cards" id="scp-container"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    COMP.5210 Assignment 2 | Process Data | Student ID: 30104373
  </div>
</footer>

<script src="js/script.js"></script>

</body>
</html>
